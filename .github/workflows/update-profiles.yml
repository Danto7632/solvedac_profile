name: Update solved.ac profiles

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Fetch profile data from Vercel API with validation
        run: |
          success=0

          for i in 1 2 3
          do
            echo "시도 $i..."
            tmp_file=$(mktemp)

            if curl -fsS "https://solvedac-profile-theta.vercel.app/api/update" -o "$tmp_file"; then
              if node -e "
                const fs = require('fs');
                const data = JSON.parse(fs.readFileSync(process.argv[1], 'utf8'));
                if (!Array.isArray(data)) process.exit(1);
                if (data.length === 0) process.exit(1);
              " "$tmp_file"; then
                mv "$tmp_file" data/profiles.json
                success=1
                echo '정상 데이터 확인 완료'
                break
              else
                echo '응답은 왔지만 유효한 프로필 배열이 아님'
              fi
            else
              echo 'API 요청 실패'
            fi

            rm -f "$tmp_file"
            echo '5초 후 재시도...'
            sleep 5
          done

          if [ "$success" -ne 1 ]; then
            echo '최종 실패: 기존 data/profiles.json 유지'
            exit 1
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/profiles.json
          git commit -m "자동 업데이트: solved.ac 프로필 ($(date +'%Y-%m-%d %H:%M:%S'))" || echo "변경 없음"
          git pull origin main --rebase
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
